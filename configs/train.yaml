model:
  base_model: "unsloth/Llama-3.2-1B-Instruct"
  tokenizer: "unsloth/Llama-3.2-1B-Instruct"
  trust_remote_code: true

lora:
  r: 16                        
  alpha: 32                    
  dropout: 0.05                
  bias: "none"                
  task_type: "CAUSAL_LM"       
  target_modules:             
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"  
  bnb_4bit_quant_type: "nf4"          
  bnb_4bit_use_double_quant: true     

training:
  num_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"        
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0                 
  max_seq_length: 768             
  fp16: true
  bf16: false                       
  gradient_checkpointing: false        
  optim: "adamw_8bit"   # mtnsach tjrb paged_adamw_32bit        

evaluation:
  strategy: "steps"
  eval_steps: 200
  save_steps: 200
  save_total_limit: 2                
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

data:
  train_path: "data/processed/train.jsonl"
  val_path: "data/processed/val.jsonl"
  test_path: "data/processed/test.jsonl"
  seed: 42
  instruction_field: "instruction"
  input_field: "input"
  output_field: "output"

output:
  dir: "outputs/phase1"
  logging_steps: 50              
  report_to: "none"              

mlflow:
  run_name: "qlora-r16-alpha32-lr2e-4"

unsloth:
  use_rslora: false
  dtype: null 

huggingface:
  push_to_hub: true
  repo_id: "igitsml/darija-llama-3.2-3b-summ" 
  private: true