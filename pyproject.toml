[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".venv",
    "__pycache__",
    "notebooks/",
    ".dvc",
]
[tool.ruff.lint]
select = [
    "E",   
    "W",   
    "F",   
    "I",   
    "B",   
]
ignore = [
    "E501", 
    "B008",  
    "F401",  
]
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
[tool.pytest.ini_options]
testpaths = ["tests/unit"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"